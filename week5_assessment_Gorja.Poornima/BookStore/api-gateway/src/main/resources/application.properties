spring.application.name=api-gateway

server.port=8080

# Enable automatic service discovery routes
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true


# Route 1: Book Service
spring.cloud.gateway.server.webflux.routes[0].id=book-service-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://bookservice
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/books/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=0


# Route 2: Order Service
spring.cloud.gateway.server.webflux.routes[1].id=order-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://orderservice
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=0


# Eureka connection
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true